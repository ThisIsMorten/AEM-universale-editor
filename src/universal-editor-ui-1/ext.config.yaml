operations:
  view:
    - type: web
      impl: index.html
actions: actions
web: web-src
hooks:
  pre-app-run: node node_modules/@adobe/uix-guest/scripts/generate-metadata.js
  pre-app-build: node node_modules/@adobe/uix-guest/scripts/generate-metadata.js
  post-app-deploy: ./hooks/post-deploy.js
runtimeManifest:
  packages:
    universal-editor-ui-1:
      license: Apache-2.0
      actions:
        get-page-content:
          function: actions/get-page-content/index.js
          web: 'yes'
          runtime: nodejs:16
          inputs:
            LOG_LEVEL: debug
            API_ENDPOINT: $API_ENDPOINT
          annotations:
            require-adobe-auth: false
            final: true
        get-publish-domain:
          function: actions/get-publish-domain/index.js
          web: 'yes'
          runtime: nodejs:22
          inputs:
            LOG_LEVEL: debug
            ORG_ID: $ORG_ID
            API_KEY: $API_KEY
            CLIENT_SECRET: $CLIENT_SECRET
          annotations:
            require-adobe-auth: false
            final: true
